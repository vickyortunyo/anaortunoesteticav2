<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="solid()"
  [class.shadow-md]="solid()"
  [class.bg-transparent]="!solid()"
>
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <a routerLink="/" class="flex items-center" (click)="closeMenu()">
        <img
          src="assets/images/logo4.png"
          alt="Ana Ortuño Estética"
          class="h-14"
        >
      </a>

      <!-- Desktop nav -->
      <div class="hidden md:flex items-center gap-8">
        <a
          routerLink="/"
          routerLinkActive="!text-gold-primary font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="font-medium transition-colors hover:text-gold-primary"
          [class.text-gold-primary]="solid()"
          [class.text-white]="!solid()"
        >
          Inicio
        </a>
        <a
          routerLink="/tratamientos"
          routerLinkActive="!text-gold-primary font-bold"
          class="font-medium transition-colors hover:text-gold-primary"
          [class.text-gold-primary]="solid()"
          [class.text-white]="!solid()"
        >
          Tratamientos
        </a>
        <!-- <a
          routerLink="/cita"
          routerLinkActive="!text-gold-primary font-bold"
          class="font-medium transition-colors hover:text-gold-primary"
          [class.text-gold-primary]="solid()"
          [class.text-white]="!solid()"
        >
          Pedir Cita
        </a> -->
        <a
          routerLink="/contacto"
          routerLinkActive="!text-gold-primary font-bold"
          class="font-medium transition-colors hover:text-gold-primary"
          [class.text-gold-primary]="solid()"
          [class.text-white]="!solid()"
        >
          Contacto
        </a>
        <a
          href="https://wa.me/34636942954?text=Hola,%20me%20gustaría%20pedir%20una%20cita"
          target="_blank"
          rel="noopener noreferrer"
          class="text-green-500 hover:text-green-600 transition-colors text-2xl"
          aria-label="Contactar por WhatsApp"
        >
          <i class="ph-fill ph-whatsapp-logo"></i>
        </a>
      </div>

      <!-- Mobile hamburger -->
      <button
        class="md:hidden p-2"
        (click)="toggleMenu()"
        [attr.aria-expanded]="mobileMenuOpen()"
        aria-label="Abrir menú de navegación"
      >
        <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          [class.text-white]="!solid()" [class.text-gold-primary]="solid()">
          @if (!mobileMenuOpen()) {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          } @else {
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          }
        </svg>
      </button>
    </div>

    <!-- Mobile menu -->
    @if (mobileMenuOpen()) {
      <div class="md:hidden bg-white rounded-2xl shadow-lg px-4 mt-2">
        <a
          routerLink="/"
          routerLinkActive="text-gold-primary font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="block py-3 text-text-body hover:text-gold-primary transition-colors border-b border-yellow-light"
          (click)="closeMenu()"
        >
          Inicio
        </a>
        <a
          routerLink="/tratamientos"
          routerLinkActive="text-gold-primary font-bold"
          class="block py-3 text-text-body hover:text-gold-primary transition-colors border-b border-yellow-light"
          (click)="closeMenu()"
        >
          Tratamientos
        </a>
        <!-- <a
          routerLink="/cita"
          routerLinkActive="text-gold-primary font-bold"
          class="block py-3 text-text-body hover:text-gold-primary transition-colors border-b border-yellow-light"
          (click)="closeMenu()"
        >
          Pedir Cita
        </a> -->
        <a
          routerLink="/contacto"
          routerLinkActive="text-gold-primary font-bold"
          class="block py-3 text-text-body hover:text-gold-primary transition-colors border-b border-yellow-light"
          (click)="closeMenu()"
        >
          Contacto
        </a>
        <a
          href="https://wa.me/34636942954?text=Hola,%20me%20gustaría%20pedir%20una%20cita"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-2 py-3 text-green-500 hover:text-green-600 transition-colors"
          (click)="closeMenu()"
        >
          <i class="ph-fill ph-whatsapp-logo text-xl"></i>
          WhatsApp
        </a>
      </div>
    }
  </nav>
</header>
