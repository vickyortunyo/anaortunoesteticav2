<a
  [routerLink]="['/tratamientos', treatment().slug]"
  class="block bg-white rounded-2xl shadow-[0_4px_20px_rgba(196,150,122,0.15)] hover:shadow-[0_8px_30px_rgba(196,150,122,0.25)] hover:-translate-y-1 transition-all duration-300 overflow-hidden group"
>
  <div class="p-6">
    <div class="flex items-center gap-2 mb-2">
      <i [class]="treatment().categoryIcon + ' text-gold-primary text-lg'"></i>
      <span class="text-xs font-semibold text-gold-primary uppercase tracking-wide">{{ treatment().categoryLabel }}</span>
    </div>
    <h3 class="font-heading text-lg font-semibold text-gold-primary mb-2 group-hover:text-gold-dark transition-colors">
      {{ treatment().name }}
    </h3>
    <p class="text-sm text-text-body mb-4">{{ treatment().shortDescription }}</p>
    <div class="flex items-center justify-between">
      <span class="text-xl font-bold text-gold-primary">{{ treatment().price }}</span>
      @if (treatment().duration) {
        <span class="text-sm text-text-body flex items-center gap-1">
          <i class="ph ph-clock"></i>
          {{ treatment().duration }}
        </span>
      }
    </div>
  </div>
</a>
