<div class="min-h-screen bg-cream flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-heading font-bold text-gold-primary">
      Acceso Admin
    </h2>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form class="space-y-6" (ngSubmit)="onSubmit()">
        <div>
          <label for="email" class="block text-sm font-medium text-text-body">
            Correo electrónico
          </label>
          <div class="mt-1">
            <input id="email" name="email" type="email" autocomplete="email" required
              [(ngModel)]="email"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-gold-primary focus:border-gold-primary sm:text-sm">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-text-body">
            Contraseña
          </label>
          <div class="mt-1">
            <input id="password" name="password" type="password" autocomplete="current-password" required
              [(ngModel)]="password"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-gold-primary focus:border-gold-primary sm:text-sm">
          </div>
        </div>

        <div *ngIf="error" class="text-red-600 text-sm">
          {{ error }}
        </div>

        <div>
          <button type="submit" [disabled]="loading"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-gold-primary hover:bg-gold-secondary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gold-primary">
            {{ loading ? 'Entrando...' : 'Entrar' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
